<!DOCTYPE html>
<html>
<head>
    <title>5D Waves - Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* Keep existing styles */
        body {
            background: linear-gradient(135deg, #333333, #222222);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 1s ease-in;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        .message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #ffffff;
        }
        .form-container {
            margin: 2rem 0;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #666;
            border-radius: 4px;
            background: #444;
            color: white;
            font-size: 16px;
        }
        button {
            background: #666666;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
        }
        button:hover {
            background: #777777;
        }
        .error {
            color: #ff6b6b;
            margin: 8px 0;
        }
        .success-container {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">5D Waves</div>
        
        <!-- Password Reset Form -->
        <div class="form-container" id="resetForm" style="display: none;">
            <div class="message">Reset Your Password</div>
            <input type="password" id="password" placeholder="Enter new password" />
            <input type="password" id="confirmPassword" placeholder="Confirm new password" />
            <div class="error" id="errorMessage"></div>
            <button onclick="resetPassword()">Reset Password</button>
        </div>

        <!-- Email Confirmation Container -->
        <div id="confirmContainer" style="display: none;">
            <div class="message">Confirming your email...</div>
            <div class="error" id="confirmError"></div>
        </div>

        <!-- Success Message -->
        <div class="success-container" id="successMessage">
            <div class="check-mark">✓</div>
            <div class="message" id="successTitle"></div>
            <div class="sub-message" id="successText"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gklyqtwbowfvtoafqhpb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrbHlxdHdib3dmdnRvYWZxaHBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc2MDc2MDksImV4cCI6MjA1MzE4MzYwOX0.iUbXVCzs7gvxx4mthJ9qXlPrs6rJT4pkVf9LJb_MRb0';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                token: params.get('confirmation_token')
            };
        }

        async function confirmEmail(token) {
            try {
                const { error } = await supabaseClient.auth.verifyOtp({
                    token: token,
                    type: 'email'
                });

                if (error) {
                    console.error("Email confirmation error:", error);
                    throw error;
                }

                document.getElementById('confirmContainer').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('successTitle').textContent = 'Email Confirmed!';
                document.getElementById('successText').innerHTML = 'Your email has been confirmed.<br>You can now close this window and return to the app.';

                setTimeout(() => {
                    window.location.href = 'io.supabase.5dwaves://login';
                }, 3000);
            } catch (error) {
                document.getElementById('confirmError').textContent = 'Failed to confirm email. Please try again.';
            }
        }

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorElement = document.getElementById('errorMessage');
            const { code } = getUrlParams();

            if (password !== confirmPassword) {
                errorElement.textContent = 'Passwords do not match';
                return;
            }

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: password,
                    token: code
                });

                if (error) {
                    console.error("Password reset error:", error);
                    if (error.message.includes('Token expired')) {
                        errorElement.textContent = 'The reset link has expired. Please request a new one.';
                    } else if (error.message.includes('Invalid reset link') || error.message.includes('Invalid token')) {
                        errorElement.textContent = 'Invalid or expired reset link. Please request a new password reset.';
                    } else if (error.message.includes('User not found')) {
                        errorElement.textContent = 'User not found. Please request a new password reset.';
                    } else {
                        errorElement.textContent = error.message;
                    }
                    return;
                }

                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('successTitle').textContent = 'Password Reset Confirmed!';
                document.getElementById('successText').innerHTML = 'Your password has been successfully reset.<br>You can now close this window and return to the app to sign in.';

                setTimeout(() => {
                    window.location.href = 'io.supabase.5dwaves://login';
                }, 3000);
            } catch (error) {
                console.error("Password reset catch error:", error);
                errorElement.textContent = error.message;
            }
        }

        window.onload = function() {
            const { code, token } = getUrlParams();

            console.log("Full URL:", window.location.href);
            console.log("Code:", code);
            console.log("Confirmation Token:", token);

            if (code) {
                document.getElementById('resetForm').style.display = 'block';
            } else if (token) {
                document.getElementById('confirmContainer').style.display = 'block';
                confirmEmail(token);
            } else {
                document.getElementById('errorMessage').textContent = 'Invalid link. Please request a new one.';
                document.getElementById('resetForm').style.display = 'none';
            }
        };
    </script>
</body>
</html>
